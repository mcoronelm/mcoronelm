<!DOCTYPE html>
<html lang="es" data-theme="">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Projects | Moises Coronel</title>
  <meta name="description" content="Proyectos y repositorios de Tu Nombre en GitHub. Análisis de datos, desarrollo web y más.">

  <!-- Open Graph -->
  <meta property="og:title"       content="Proyectos | Tu Nombre">
  <meta property="og:description" content="Repositorios y proyectos destacados de GitHub.">
  <meta property="og:image"       content="assets/photo.jpg">
  <meta property="og:url"         content="https://tu-usuario.github.io/projects.html">
  <meta property="og:type"        content="website">

  <!-- Twitter Card -->
  <meta name="twitter:card"        content="summary_large_image">
  <meta name="twitter:title"       content="Proyectos | Tu Nombre">
  <meta name="twitter:description" content="Repositorios y proyectos destacados de GitHub.">

  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' fill='%23080808'/><text x='4' y='24' font-size='20' font-family='monospace' fill='%23c8a96e'>∴</text></svg>">
  <link rel="stylesheet" href="style.css">
</head>
<body id="page-projects">

  <!-- Custom cursor (desktop) -->
  <div id="cursor" aria-hidden="true"></div>
  <div id="cursor-dot" aria-hidden="true"></div>

  <!-- Sidebar navigation -->
  <aside id="sidebar" aria-label="Navegación principal"></aside>

  <!-- Mobile bottom navigation -->
  <nav id="mobile-nav" aria-label="Navegación móvil"></nav>

  <main class="main-content" role="main">

    <!-- Page header -->
    <header class="page-header">
      <div class="terminal-label">
        <span class="prompt">&gt;</span>
        PROJECTS
        <span class="terminal-cursor" aria-hidden="true"></span>
      </div>
      <p class="label">Repositories uploaded from the GitHub API</p>
    </header>

    <!-- Projects grid -->
    <div class="projects-content">

      <!-- Error state (hidden by default) -->
      <div class="error-state" id="error-state" role="alert">
        <p class="error-text">ERROR: Unable to connect to the GitHub API</p>
        <button class="btn" id="retry-btn">
          <svg viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="2" width="14" height="14">
            <polyline points="1 4 1 10 7 10"/><polyline points="23 20 23 14 17 14"/>
            <path d="M20.49 9A9 9 0 005.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 013.51 15"/>
          </svg>
          [ RETRY ]
        </button>
      </div>

      <!-- Cards grid -->
      <div class="projects-grid" id="projects-grid">
        <!-- Populated by JS -->
      </div>

    </div>

  </main>

  <script src="data.js" defer></script>
  <script src="script.js" defer></script>
</body>
</html>
